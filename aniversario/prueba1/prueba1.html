<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ábrelo — Scroll Libre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Cormorant Garamond', Georgia, serif;
    cursor: grab;
    user-select: none;
  }
  body.dragging { cursor: grabbing; }
  canvas { display: block; }

  #hint {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    letter-spacing: 0.18em;
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    pointer-events: none;
    transition: opacity 1.2s ease;
    white-space: nowrap;
  }

  #branding {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 8px;
    pointer-events: none;
    opacity: 0.4;
  }
  #branding img {
    height: 22px;
    width: auto;
    filter: invert(1);
    opacity: 0.6;
  }
  #branding span {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<!-- ============================================================
     CONFIGURACIÓN — editar estos valores para personalizar
     ============================================================ -->
<script>
const CONFIG = {
  para: "Valentina",
  de: "Mateo",
  ocasion: "con amor",                       // se muestra debajo del nombre
  mensaje: "Cada momento contigo\nes un universo\nque quiero\nexplorar.",
  fragmentos: [
    "desde el primer día",
    "te elegí",
    "y te volvería\na elegir",
    "siempre",
    "en cada\nversión\nde esta vida",
    "gracias\npor existir",
    "eres mi\nlugar favorito",
    "no hay palabras\nsuficientes",
    "pero lo intento",
    "infinitamente",
    "tuyo",
  ],
  // Fotos: reemplaza null con URL directa de imagen (ImgBB, Cloudinary, etc.)
  // Ejemplo: "https://i.ibb.co/xxxx/foto.jpg"
  fotos: [
    null,
    null,
    null,
    null,
    null,
  ],
  musica: "./Interstellar.mp3",
};
</script>
<!-- ============================================================ -->

<canvas id="c"></canvas>
<div id="hint">arrastra para explorar</div>
<div id="branding">
  <img src="../img/logo.png" alt="Ábrelo" onerror="this.style.display='none'">
  <span>Ábrelo</span>
</div>

<script>
(function() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', () => { resize(); });

  // --- Cámara ---
  let camX = 0, camY = 0;
  let targetX = 0, targetY = 0;
  let isDragging = false;
  let lastMX = 0, lastMY = 0;
  let velX = 0, velY = 0;

  // --- Estado UI ---
  let hintHidden = false;
  let revealedCenter = false;
  let centerReveal = 0;

  // --- Música ---
 let audio = null;
if (CONFIG.musica) {
  audio = new Audio(CONFIG.musica);
  audio.loop = true;
  audio.volume = 0.5;
  const startAudio = () => {
    audio.play().catch(() => {});
    document.removeEventListener('touchstart', startAudio);
    document.removeEventListener('click', startAudio);
  };
  document.addEventListener('touchstart', startAudio, { once: true });
  document.addEventListener('click', startAudio, { once: true });
}

  // --- Fotos precargadas ---
  const photoImages = CONFIG.fotos.map(src => {
    if (!src) return null;
    const img = new Image();
    img.src = src;
    return img;
  });

  // --- Semilla aleatoria determinista ---
  function rng(s) {
    const x = Math.sin(s + 1) * 10000;
    return x - Math.floor(x);
  }

  // --- Construir fragmentos en el mundo ---
  const fragments = [];

  function buildFragments() {
    const texts = CONFIG.fragmentos;
    const count = texts.length;
    const ring1 = 240, ring2 = 480;

    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2 + (rng(i * 7) - 0.5) * 0.9;
      const r = ring1 + rng(i * 13) * (ring2 - ring1);
      fragments.push({
        x: Math.cos(angle) * r,
        y: Math.sin(angle) * r,
        text: texts[i],
        opacity: 0,
        size: 14 + rng(i * 3) * 12,
        italic: rng(i * 11) > 0.45,
        rotation: (rng(i * 5) - 0.5) * 0.18,
        isPhoto: false,
      });
    }

    const photoAngles = [0.4, 1.3, 2.2, 3.6, 4.9];
    const photoR = 640;
    for (let i = 0; i < 5; i++) {
      fragments.push({
        x: Math.cos(photoAngles[i]) * photoR,
        y: Math.sin(photoAngles[i]) * (photoR - 60),
        isPhoto: true,
        photoIndex: i,
        opacity: 0,
        size: 72 + rng(i * 17) * 36,
        rotation: (rng(i * 9) - 0.5) * 0.22,
      });
    }
  }
  buildFragments();

  // --- Estrellas del fondo ---
  const stars = [];
  for (let i = 0; i < 100; i++) {
    stars.push({
      x: (rng(i * 31) - 0.5) * 3200,
      y: (rng(i * 37) - 0.5) * 3200,
      r: 0.4 + rng(i * 41) * 1.2,
      a: 0.08 + rng(i * 43) * 0.28,
    });
  }

  // --- Utilidades ---
  function ease(cur, tar, f) { return cur + (tar - cur) * f; }

  // --- Dibujar fragmento ---
  function drawFragment(f) {
    const sx = f.x + camX + W / 2;
    const sy = f.y + camY + H / 2;
    if (sx < -250 || sx > W + 250 || sy < -250 || sy > H + 250) return;

    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(f.rotation || 0);
    ctx.globalAlpha = f.opacity;

    if (f.isPhoto) {
      const s = f.size;
      const img = photoImages[f.photoIndex];
      if (img && img.complete && img.naturalWidth > 0) {
        ctx.drawImage(img, -s / 2, -s / 2, s, s);
        ctx.strokeStyle = 'rgba(255,255,255,0.18)';
        ctx.lineWidth = 1;
        ctx.strokeRect(-s / 2, -s / 2, s, s);
      } else {
        ctx.strokeStyle = 'rgba(255,255,255,0.18)';
        ctx.lineWidth = 1;
        ctx.strokeRect(-s / 2, -s / 2, s, s);
        ctx.fillStyle = 'rgba(255,255,255,0.04)';
        ctx.fillRect(-s / 2, -s / 2, s, s);
        ctx.fillStyle = 'rgba(255,255,255,0.18)';
        ctx.font = '22px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('✦', 0, 0);
      }
    } else {
      const lines = f.text.split('\n');
      ctx.font = `${f.italic ? 'italic ' : ''}${f.size}px 'Cormorant Garamond', Georgia, serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(255,255,255,0.72)';
      const lh = f.size * 1.35;
      const totalH = (lines.length - 1) * lh;
      lines.forEach((line, i) => {
        ctx.fillText(line, 0, i * lh - totalH / 2);
      });
    }

    ctx.restore();
  }

  // --- Dibujar centro ---
  function drawCenter() {
    const cx = camX + W / 2;
    const cy = camY + H / 2;
    if (cx < -320 || cx > W + 320 || cy < -320 || cy > H + 320) return;

    ctx.save();
    ctx.translate(cx, cy);

    const t = Date.now() * 0.001;
    const pulse = 88 + Math.sin(t) * 5;

    // Aura exterior
    ctx.beginPath();
    ctx.arc(0, 0, pulse + 18, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Círculo principal
    ctx.beginPath();
    ctx.arc(0, 0, pulse, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.13)';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fill();

    const r = centerReveal;

    if (r < 0.05) {
      // Punto de atracción antes del reveal
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.font = '11px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('· · ·', 0, 0);
    } else {
      // PARA
      ctx.globalAlpha = Math.min(1, r * 1.4);
      ctx.font = `300 10px 'Montserrat', sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.letterSpacing = '0.22em';
      ctx.fillText(`PARA ${CONFIG.para.toUpperCase()}`, 0, -92 * Math.min(1, r * 1.5));
      ctx.font = `300 9px 'Montserrat', sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillText(CONFIG.ocasion, 0, -76 * Math.min(1, r * 1.5));

      // Mensaje central
      ctx.globalAlpha = r;
      const lines = CONFIG.mensaje.split('\n');
      const sizes = [30, 28, 25, 22];
      const lh = 38;
      const totalH = (lines.length - 1) * lh;
      lines.forEach((line, i) => {
        const sz = sizes[Math.min(i, sizes.length - 1)];
        ctx.font = `italic ${sz}px 'Cormorant Garamond', Georgia, serif`;
        ctx.fillStyle = `rgba(255,255,255,${0.88 * r})`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(line, 0, i * lh - totalH / 2);
      });

      // DE
      ctx.globalAlpha = Math.min(1, r * 1.2);
      ctx.font = `italic 300 13px 'Cormorant Garamond', Georgia, serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.28)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`— ${CONFIG.de}`, 0, 96 * Math.min(1, r * 1.5));
    }

    ctx.restore();
  }

  // --- Loop principal ---
  function draw(ts) {
    camX = ease(camX, targetX, 0.09);
    camY = ease(camY, targetY, 0.09);

    if (!isDragging) {
      targetX += velX;
      targetY += velY;
      velX *= 0.91;
      velY *= 0.91;
    }

    // Distancia del centro del mundo
    const distFromCenter = Math.sqrt(camX * camX + camY * camY);

    if (distFromCenter < 110 && !revealedCenter) {
      revealedCenter = true;
    }
    if (revealedCenter) {
      centerReveal = Math.min(1, centerReveal + 0.018);
    }

    // Fondo
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);

    // Estrellas
    stars.forEach(s => {
      const sx = s.x + camX + W / 2;
      const sy = s.y + camY + H / 2;
      if (sx < -5 || sx > W + 5 || sy < -5 || sy > H + 5) return;
      ctx.beginPath();
      ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.a})`;
      ctx.fill();
    });

    // Fragmentos — fade in/out por proximidad a pantalla
    const threshold = Math.min(W, H) * 0.52;
    fragments.forEach(f => {
      const dx = f.x + camX;
      const dy = f.y + camY;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < threshold) {
        f.opacity = Math.min(1, f.opacity + 0.025);
      } else {
        f.opacity = Math.max(0, f.opacity - 0.018);
      }
      if (f.opacity > 0) drawFragment(f);
    });

    // Centro
    drawCenter();

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);

  // --- Controles mouse ---
  canvas.addEventListener('mousedown', e => {
    isDragging = true;
    document.body.classList.add('dragging');
    lastMX = e.clientX;
    lastMY = e.clientY;
    velX = 0; velY = 0;
    hideHint();
  });

  canvas.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - lastMX;
    const dy = e.clientY - lastMY;
    velX = dx * 0.38;
    velY = dy * 0.38;
    targetX += dx;
    targetY += dy;
    lastMX = e.clientX;
    lastMY = e.clientY;
  });

  canvas.addEventListener('mouseup', stopDrag);
  canvas.addEventListener('mouseleave', stopDrag);
  function stopDrag() {
    isDragging = false;
    document.body.classList.remove('dragging');
  }

  // --- Controles touch ---
  let lastTX = 0, lastTY = 0;
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    isDragging = true;
    const t = e.touches[0];
    lastTX = t.clientX;
    lastTY = t.clientY;
    velX = 0; velY = 0;
    hideHint();
  }, { passive: false });
  
  canvas.addEventListener('touchend', () => { isDragging = false; });

  function hideHint() {
    if (!hintHidden) {
      hintHidden = true;
      document.getElementById('hint').style.opacity = '0';
    }
  }

  let currentScale = 1;
let lastPinchDist = null;

canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2) lastPinchDist = null;
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length !== 2) return;
  e.preventDefault();
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (lastPinchDist !== null) {
    const delta = dist - lastPinchDist;
    currentScale = Math.max(0.4, Math.min(3, currentScale + delta * 0.005));
    ctx.setTransform(currentScale, 0, 0, currentScale, W/2 * (1 - currentScale), H/2 * (1 - currentScale));
  }
  lastPinchDist = dist;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (e.touches.length < 2) lastPinchDist = null;
});
})();

</script>
</body>
</html>
